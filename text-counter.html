<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Counter - Free Online Text Analysis Tool</title>
<meta name="description" content="Free text counter tool. Analyze your text for words, characters, lines, and get instant stats.">
<link rel="canonical" href="https://smart-tools-hub.github.io/text-counter.html" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 950px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h1 {
  text-align: center;
  color: #333;
  margin-bottom: 10px;
  font-size: 32px;
}
.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 25px;
  font-size: 14px;
}
textarea {
  width: 100%;
  height: 280px;
  padding: 15px;
  font-size: 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  resize: vertical;
  font-family: 'Courier New', monospace;
  transition: border 0.3s;
}
textarea:focus {
  outline: none;
  border-color: #667eea;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin-top: 25px;
}
.stat-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  transition: transform 0.2s;
}
.stat-card:hover {
  transform: translateY(-5px);
}
.stat-card h3 {
  margin: 0;
  font-size: 36px;
  font-weight: 700;
}
.stat-card p {
  margin: 8px 0 0 0;
  font-size: 13px;
  opacity: 0.9;
  text-transform: uppercase;
  letter-spacing: 1px;
}
@media (max-width: 600px) {
  .container {
    padding: 20px;
  }
  h1 {
    font-size: 24px;
  }
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>Text Counter</h1>
  <p class="subtitle">Type or paste your text below to get instant analysis</p>
  
  <textarea id="textInput" placeholder="Start typing here..."></textarea>
  
  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="wordCount">0</h3>
      <p>Words</p>
    </div>
    <div class="stat-card">
      <h3 id="charCount">0</h3>
      <p>Characters</p>
    </div>
    <div class="stat-card">
      <h3 id="charNoSpace">0</h3>
      <p>No Spaces</p>
    </div>
    <div class="stat-card">
      <h3 id="lineCount">0</h3>
      <p>Lines</p>
    </div>
    <div class="stat-card">
      <h3 id="uniqueWords">0</h3>
      <p>Unique Words</p>
    </div>
    <div class="stat-card">
      <h3 id="readingTime">0</h3>
      <p>Min Read</p>
    </div>
  </div>
</div>

<script>
const textInput = document.getElementById('textInput');
textInput.addEventListener('input', updateStats);

function updateStats() {
  const text = textInput.value;
  
  // Words count
  const words = text.trim() ? text.trim().split(/\s+/) : [];
  const wordCount = words.length;
  
  // Characters
  const charCount = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;
  
  // Lines
  const lines = text ? text.split('\n').length : 0;
  
  // Unique words
  const uniqueWords = new Set(words.map(w => w.toLowerCase().replace(/[^a-z0-9]/g, ''))).size;
  
  // Reading time
  const readingTime = Math.ceil(wordCount / 200);
  
  document.getElementById('wordCount').textContent = wordCount;
  document.getElementById('charCount').textContent = charCount;
  document.getElementById('charNoSpace').textContent = charNoSpace;
  document.getElementById('lineCount').textContent = lines;
  document.getElementById('uniqueWords').textContent = uniqueWords;
  document.getElementById('readingTime').textContent = readingTime;
}
</script>
</body>
</html>
